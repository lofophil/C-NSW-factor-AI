# ============================================================
# NSW C-Factor AI — 项目全局配置
# ============================================================

# ---------- 研究区域 ----------
region:
  name: "NSW_pilot"
  # NSW 全州边界（WGS84）
  bbox:
    lon_min: 140.999
    lon_max: 153.639
    lat_min: -37.505
    lat_max: -28.157
  # 小范围快速测试区（悉尼西部农业区）
  bbox_test:
    lon_min: 147.0
    lon_max: 149.0
    lat_min: -34.0
    lat_max: -32.5
  crs: "EPSG:32755" # UTM Zone 55S，NSW 常用投影

# ---------- 时间范围 ----------
time:
  start: "2019-01-01"
  end: "2023-12-31"
  # 用于训练标签配对的月份列表（可选，留空表示全年）
  target_months: []

# ---------- Sentinel-2 参数 ----------
sentinel2:
  # 数据源：Microsoft Planetary Computer（替代 DEA Sandbox）
  stac_endpoint: "https://planetarycomputer.microsoft.com/api/stac/v1"
  collection: "sentinel-2-l2a"
  cloud_cover_max: 20
  bands:
    - "B02" # Blue  10m
    - "B03" # Green 10m
    - "B04" # Red   10m
    - "B08" # NIR   10m
    - "B8A" # NIR narrow 20m
    - "B11" # SWIR  20m
  resolution: 10

# ---------- 衍生指数 ----------
indices:
  - NDVI # (NIR - Red) / (NIR + Red) — 光合植被覆盖
  - NDWI # (Green - NIR) / (Green + NIR) — 土壤含水量
  - BSI # (SWIR + Red - NIR - Blue) / (SWIR + Red + NIR + Blue) — 裸土指数
  - SAVI # (NIR - Red) / (NIR + Red + L) * (1+L), L=0.5 — 土壤调整植被

# ---------- 标签数据 ----------
labels:
  # NSW SEED RUSLE C 因子（MODIS 500m 基准）
  c_factor_seed_url: "https://datasets.seed.nsw.gov.au/dataset/annual-hillslope-erosion-rulse-factors"
  # DEA 分数植被覆盖（Fractional Cover）
  fc_product: "ga_ls_fc_pc_cyear_3"
  # 月度裸土侵蚀 GeoTIFF 基础 URL
  monthly_erosion_base: "https://datasets.seed.nsw.gov.au/dataset/db9a8486-7401-4213-99b8-66037fda1a9c"

# ---------- 数据路径 ----------
paths:
  raw_data: "data/raw"
  processed_data: "data/processed"
  models: "models"
  figures: "results/figures"
  reports: "results/reports"

# ---------- 模型超参数 ----------
model:
  # 基线随机森林
  random_forest:
    n_estimators: 200
    max_depth: 15
    min_samples_leaf: 4
    n_jobs: -1
    random_state: 42

  # U-Net 深度学习
  unet:
    encoder: "resnet34"
    encoder_weights: "imagenet"
    in_channels: 9 # Sentinel-2 波段数 + 衍生指数数
    patch_size: 256
    batch_size: 16
    learning_rate: 0.0001
    epochs: 100
    early_stopping_patience: 15

# ---------- 评估 ----------
evaluation:
  test_split: 0.15
  val_split: 0.15
  spatial_cv_folds: 5 # 空间交叉验证折数（避免空间自相关泄漏）
  metrics:
    - RMSE
    - MAE
    - R2
    - spatial_correlation
